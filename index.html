<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Workspace</title>
  <style>
    :root {
      --bg:#0f1724; --card:#0b1220; --muted:#94a3b8; --accent:#7c3aed;
      --success:#10b981; --danger:#ef4444; --radius:12px;
    }
    * { box-sizing:border-box; }
    html,body { height:100%; margin:0; font-family:Inter,system-ui,Segoe UI,Roboto,Arial; 
                color:#e6eef8; background:var(--bg); }
    .app { display:flex; height:100vh; overflow:hidden; }

    
    .sidebar {
      width:240px; background:linear-gradient(180deg,var(--card),#0a0f1a); border-right:1px solid rgba(255,255,255,0.03);
      padding:20px; display:flex; flex-direction:column; gap:20px; overflow-y:auto;
    }
    .sidebar h1 { margin:0; font-size:1.1rem; color:#fff; }
    .nav { display:flex; flex-direction:column; gap:8px; }
    .nav button {
      background:transparent; border:1px solid rgba(255,255,255,0.06); color:var(--muted);
      padding:10px 12px; border-radius:8px; cursor:pointer; text-align:left; transition:.2s;
    }
    .nav button:hover, .nav button.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .header { padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.03); background:linear-gradient(90deg,rgba(255,255,255,0.01),transparent); }
    .header h2 { margin:0; font-size:1.4rem; }
    .content { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }

    .page { display:none; }
    .page.active { display:block; }

    .chat-wrap { display:flex; flex-direction:column; height:100%; gap:12px; background:linear-gradient(180deg,rgba(255,255,255,0.01),transparent);
                  border-radius:var(--radius); padding:16px; border:1px solid rgba(255,255,255,0.03); }
    .messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:75%; padding:12px 14px; border-radius:12px; line-height:1.4; }
    .msg.user { margin-left:auto; background:linear-gradient(180deg,var(--accent),#6d28d9); color:#fff; border-bottom-right-radius:6px; }
    .msg.assistant { margin-right:auto; background:rgba(255,255,255,0.04); color:#e6eef8; border:1px solid rgba(255,255,255,0.03);
                     border-bottom-left-radius:6px; }
    .msg .meta { font-size:0.75rem; color:rgba(255,255,255,0.6); margin-bottom:4px; }
    .msg .text { word-break:break-word; }
    .typing { display:inline-flex; gap:4px; align-items:center; }
    .dot { width:6px; height:6px; background:rgba(255,255,255,0.6); border-radius:50%; animation:blink 1s infinite; }
    .dot:nth-child(2) { animation-delay:.15s; }
    .dot:nth-child(3) { animation-delay:.3s; }
    @keyframes blink { 50% { opacity:.2; } }

    .input-area { display:flex; gap:8px; align-items:flex-end; }
    textarea { flex:1; min-height:44px; max-height:120px; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.04);
               background:transparent; color:inherit; resize:none; }
    textarea::placeholder { color:rgba(255,255,255,0.5); }
    button { cursor:pointer; transition:.2s; }

    .tools-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px; }
    .tool { background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent); border:1px solid rgba(255,255,255,0.03);
            border-radius:var(--radius); padding:16px; }
    .tool h3 { margin:0 0 8px 0; color:#fff; }
    .tool p { margin:0 0 12px 0; color:var(--muted); font-size:0.9rem; }
    .tool textarea { width:100%; min-height:100px; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.04);
                     background:transparent; color:inherit; font-size:0.9rem; }
    .tool-output { background:rgba(0,0,0,0.2); padding:12px; border-radius:8px; margin-top:10px; max-height:200px; overflow-y:auto;
                   border-left:3px solid var(--accent); }

    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; }
    .stat-card { background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(16,185,129,0.1)); border:1px solid rgba(255,255,255,0.03);
                 border-radius:var(--radius); padding:16px; text-align:center; }
    .stat-card .value { font-size:2rem; font-weight:700; color:var(--accent); }
    .stat-card .label { color:var(--muted); font-size:0.9rem; margin-top:8px; }

    .activity-log { background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent); border:1px solid rgba(255,255,255,0.03);
                    border-radius:var(--radius); padding:16px; max-height:400px; overflow-y:auto; }
    .log-item { padding:8px; border-bottom:1px solid rgba(255,255,255,0.03); font-size:0.9rem; }
    .log-item:last-child { border-bottom:none; }
    .log-time { color:var(--muted); }

    @media (max-width:768px) {
      .app { flex-direction:column; }
      .sidebar { width:100%; height:auto; border-right:none; border-bottom:1px solid rgba(255,255,255,0.03); }
      .nav { flex-direction:row; }
      .msg { max-width:90%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <h1>🤖 AI Workspace</h1>
      <nav class="nav">
        <button class="nav-btn active" data-page="chat">💬 Chat</button>
        <button class="nav-btn" data-page="tools">🧠 Tools</button>
        <button class="nav-btn" data-page="dashboard">📊 Dashboard</button>
      </nav>
    </div>

    <div class="main">
      <div class="header">
        <h2 id="pageTitle">Chat</h2>
      </div>

      <div class="content">
        <div id="chat" class="page active">
          <div class="chat-wrap">
            <div id="messages" class="messages" role="log" aria-live="polite"></div>
            <form id="chatForm" class="input-area" onsubmit="return false;">
              <textarea id="chatInput" placeholder="Ask me anything..." aria-label="Chat input"></textarea>
              <button type="button" id="sendBtn" class="btn primary" style="background:var(--accent);color:white;border:0;padding:10px 14px;border-radius:8px">Send</button>
            </form>
          </div>
        </div>

        <div id="tools" class="page">
          <div class="tools-grid">
            <div class="tool">
              <h3>📝 Text Summarizer</h3>
              <p>Condense long text into key points</p>
              <textarea id="summarizeInput" placeholder="Paste text to summarize..."></textarea>
              <button type="button" onclick="summarizeText()" style="background:var(--accent);color:white;border:0;padding:8px 12px;border-radius:8px;margin-top:8px;width:100%">Summarize</button>
              <div id="summarizeOutput" class="tool-output" hidden></div>
            </div>

            <div class="tool">
              <h3>📄 Notes Generator</h3>
              <p>Generate structured notes from content</p>
              <textarea id="notesInput" placeholder="Enter content for notes..."></textarea>
              <button type="button" onclick="generateNotes()" style="background:var(--success);color:white;border:0;padding:8px 12px;border-radius:8px;margin-top:8px;width:100%">Generate Notes</button>
              <div id="notesOutput" class="tool-output" hidden></div>
            </div>

            <div class="tool">
              <h3>💻 Code Explainer</h3>
              <p>Understand code snippets better</p>
              <textarea id="codeInput" placeholder="Paste code here..." style="font-family:monospace;"></textarea>
              <button type="button" onclick="explainCode()" style="background:var(--danger);color:white;border:0;padding:8px 12px;border-radius:8px;margin-top:8px;width:100%">Explain</button>
              <div id="codeOutput" class="tool-output" hidden></div>
            </div>
          </div>
        </div>

        <div id="dashboard" class="page">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="value" id="chatCount">0</div>
              <div class="label">Messages Sent</div>
            </div>
            <div class="stat-card">
              <div class="value" id="toolsCount">0</div>
              <div class="label">Tools Used</div>
            </div>
            <div class="stat-card">
              <div class="value" id="sessionsCount">1</div>
              <div class="label">Sessions</div>
            </div>
          </div>

          <div style="margin-top:20px">
            <h3 style="margin-bottom:12px">Recent Activity</h3>
            <div id="activityLog" class="activity-log">
              <div class="log-item" style="color:var(--muted)">No activity yet</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      messages: JSON.parse(localStorage.getItem('chatHistory') || '[]'),
      activity: JSON.parse(localStorage.getItem('activity') || '[]'),
      chatCount: 0,
      toolsCount: 0,
    };

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const page = btn.dataset.page;
        document.getElementById(page).classList.add('active');
        const titles = { chat:'Chat', tools:'Tools', dashboard:'Dashboard' };
        document.getElementById('pageTitle').textContent = titles[page];
      });
    });

    function renderMessages(){
      const messagesEl = document.getElementById('messages');
      messagesEl.innerHTML = '';
      state.messages.forEach(m => {
        const el = document.createElement('div');
        el.className = 'msg ' + m.role;
        el.innerHTML = `<div class="meta">${m.role === 'user' ? 'You' : 'Assistant'}</div><div class="text">${escapeHtml(m.content)}</div>`;
        messagesEl.appendChild(el);
      });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    document.getElementById('sendBtn').addEventListener('click', async () => {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if(!msg) return;
      
      state.messages.push({ role:'user', content:msg });
      input.value = '';
      renderMessages();
      state.chatCount++;
      logActivity('Sent message: ' + msg.slice(0,30) + '...');

      const typingDiv = document.createElement('div');
      typingDiv.className = 'msg assistant';
      typingDiv.innerHTML = '<div class="meta">Assistant</div><div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      document.getElementById('messages').appendChild(typingDiv);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

      await new Promise(r => setTimeout(r, 800));
      const reply = mockAIReply(msg);
      typingDiv.remove();
      state.messages.push({ role:'assistant', content:reply });
      renderMessages();
      localStorage.setItem('chatHistory', JSON.stringify(state.messages));
    });

    function mockAIReply(prompt){
      const replies = [
        'That\'s a great question! Here\'s what I think...',
        'I understand. Let me help you with that.',
        'About your query: ' + prompt.slice(0,40) + ', I would say...',
        'Interesting! I can provide more details if you need.',
      ];
      return replies[Math.floor(Math.random()*replies.length)];
    }

    function summarizeText(){
      const input = document.getElementById('summarizeInput').value;
      if(!input) return;
      const output = input.split('.').slice(0,2).join('. ').trim() + '...';
      const el = document.getElementById('summarizeOutput');
      el.innerHTML = '<strong>Summary:</strong><br>' + escapeHtml(output);
      el.hidden = false;
      logActivity('Used Summarizer');
      state.toolsCount++;
    }

    function generateNotes(){
      const input = document.getElementById('notesInput').value;
      if(!input) return;
      const lines = input.split('\n').filter(l => l.trim());
      const notes = lines.map((l,i) => `${i+1}. ${l.slice(0,60)}`).join('<br>');
      const el = document.getElementById('notesOutput');
      el.innerHTML = '<strong>Notes:</strong><br>' + notes;
      el.hidden = false;
      logActivity('Generated notes');
      state.toolsCount++;
    }

    function explainCode(){
      const input = document.getElementById('codeInput').value;
      if(!input) return;
      const el = document.getElementById('codeOutput');
      el.innerHTML = '<strong>Explanation:</strong><br>This code snippet contains ' + input.split('\n').length + ' lines. Key patterns detected: variables, functions, logic flow.';
      el.hidden = false;
      logActivity('Explained code');
      state.toolsCount++;
    }

    function updateDashboard(){
      document.getElementById('chatCount').textContent = state.chatCount;
      document.getElementById('toolsCount').textContent = state.toolsCount;
      const activityLog = document.getElementById('activityLog');
      activityLog.innerHTML = state.activity.slice(-5).reverse().map(a => 
        `<div class="log-item"><span class="log-time">${a.time}</span> — ${a.text}</div>`
      ).join('') || '<div class="log-item" style="color:var(--muted)">No activity yet</div>';
    }

    function logActivity(text){
      const now = new Date().toLocaleTimeString();
      state.activity.push({ time:now, text });
      updateDashboard();
      localStorage.setItem('activity', JSON.stringify(state.activity));
    }

    document.getElementById('clearBtn') || document.addEventListener('DOMContentLoaded', () => {});
    function clearData(){
      if(confirm('Clear all data?')){
        localStorage.clear();
        state.messages = [];
        state.activity = [];
        state.chatCount = 0;
        state.toolsCount = 0;
        renderMessages();
        updateDashboard();
      }
    }

    function escapeHtml(s){
      return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    renderMessages();
    updateDashboard();
  </script>
</body>
</html>
